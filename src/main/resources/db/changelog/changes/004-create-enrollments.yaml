databaseChangeLog:
  - changeSet:
      id: 4
      author: Rayana
      changes:
        - createTable:
            tableName: enrollments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: enrolled_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: progress
                  type: INT
                  defaultValue: 0
              - column:
                  name: completed
                  type: BOOLEAN
                  defaultValueBoolean: false
        - addForeignKeyConstraint:
            baseTableName: enrollments
            baseColumnNames: user_id
            constraintName: fk_enrollments_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: enrollments
            baseColumnNames: course_id
            constraintName: fk_enrollments_course
            referencedTableName: courses
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_enrollments_user_id
            tableName: enrollments
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_enrollments_course_id
            tableName: enrollments
            columns:
              - column:
                  name: course_id