databaseChangeLog:
  - changeSet:
      id: 5
      author: Rayana
      changes:
        - createTable:
            tableName: sections
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: order_index
                  type: INT
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: sections
            baseColumnNames: course_id
            constraintName: fk_sections_course
            referencedTableName: courses
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_sections_course_id
            tableName: sections
            columns:
              - column:
                  name: course_id

  - changeSet:
      id: 6
      author: Rayana
      changes:
        - createTable:
            tableName: lessons
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: lesson_type
                  type: VARCHAR(50)
                  defaultValue: TEXT
              - column:
                  name: video_url
                  type: VARCHAR(500)
              - column:
                  name: resource_url
                  type: VARCHAR(500)
              - column:
                  name: duration_minutes
                  type: INT
              - column:
                  name: order_index
                  type: INT
              - column:
                  name: section_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: lessons
            baseColumnNames: section_id
            constraintName: fk_lessons_section
            referencedTableName: sections
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_lessons_section_id
            tableName: lessons
            columns:
              - column:
                  name: section_id