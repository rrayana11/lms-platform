<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все курсы - LMS Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4">Все курсы</h1>

    <div class="row g-4" th:if="${courses != null}">
        <div class="col-md-4" th:each="course : ${courses}">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${course.title}">Название курса</h5>
                    <p class="card-text" th:text="${course.description}">Описание</p>
                    <a th:href="@{/courses/{id}(id=${course.id})}" class="btn btn-primary">
                        Подробнее
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-info" th:if="${courses == null || courses.isEmpty()}">
        Курсы не найдены
    </div>

    <a th:href="@{/}" class="btn btn-secondary mt-3">
        ← На главную
    </a>
</div>
</body>
</html>
